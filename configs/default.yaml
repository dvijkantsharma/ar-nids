project_name: ar-nids
labels:
  - Benign
  - DoS
  - Probe
  - R2L
  - U2R
  - Unknown
feature_count: 80
packet_window_size: 50
sequence_length: 100
pca_components: 40
rolling_window_seconds: 300
batch_size: 128
epochs: 20
learning_rate: 0.001
dropout: 0.3
recurrent_dropout: 0.2
l2_weight_decay: 0.0001
adversarial:
  enabled: true
  epsilon: 0.1
  alpha: 0.01
  steps: 10
  smoothing_sigma: 0.05
serving:
  confidence_threshold: 0.6
  mmd_threshold: 0.15
  explanation_budget_ms: 200
mlflow:
  experiment_name: ar-nids
