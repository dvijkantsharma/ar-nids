apiVersion: apps/v1
kind: Deployment
metadata:
  name: ar-nids
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ar-nids
  template:
    metadata:
      labels:
        app: ar-nids
    spec:
      containers:
        - name: api
          image: ar-nids:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "8"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ar-nids
spec:
  selector:
    app: ar-nids
  ports:
    - port: 80
      targetPort: 8000
